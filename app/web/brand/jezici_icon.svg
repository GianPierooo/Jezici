<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8A7BF6"/>
      <stop offset="1" stop-color="#5B4ECF"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D17A"/>
      <stop offset="1" stop-color="#1E9B52"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <!-- parrot, centrado en la zona segura (~62%) -->
  <g transform="translate(512,548)">
    <!-- cola -->
    <path d="M-40 150 C -150 250 -120 330 -40 300 C -10 250 -10 200 -40 150 Z" fill="#1E9B52"/>
    <!-- cuerpo -->
    <ellipse cx="0" cy="60" rx="150" ry="180" fill="url(#body)"/>
    <!-- ala -->
    <path d="M70 -20 C 150 30 150 160 60 210 C 110 120 90 30 40 0 Z" fill="#7BE0A6"/>
    <!-- cabeza -->
    <circle cx="-20" cy="-150" r="115" fill="url(#body)"/>
    <!-- cresta coral -->
    <path d="M-70 -240 C -60 -290 -20 -300 -30 -250 C 0 -300 30 -290 10 -245 Z" fill="#FF6B6B"/>
    <!-- cara clara -->
    <circle cx="-60" cy="-140" r="58" fill="#EAFBF1"/>
    <!-- ojo -->
    <circle cx="-58" cy="-160" r="26" fill="#1A1A2E"/>
    <circle cx="-50" cy="-168" r="9" fill="#FFFFFF"/>
    <!-- pico dorado -->
    <path d="M-120 -135 C -185 -150 -190 -95 -120 -95 C -95 -120 -100 -130 -120 -135 Z" fill="#FFC93C"/>
    <path d="M-118 -97 C -165 -90 -160 -60 -118 -70 Z" fill="#E0980C"/>
    <!-- patas -->
    <rect x="-30" y="225" width="16" height="46" rx="8" fill="#FFC93C"/>
    <rect x="14" y="225" width="16" height="46" rx="8" fill="#FFC93C"/>
  </g>
</svg>
