<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Jezici — aprende inglés con un plan, mapa, las 4 habilidades y certificación por examen.">
  <meta name="theme-color" content="#6C5CE7">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Jezici">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Jezici — aprende inglés</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Service worker PWA (update-safe): instala el app shell para que sea
    instalable y funcione offline, sirviendo la app NETWORK-FIRST para no
    quedarse en versiones viejas, y maneja Web Push (Matix). Se registra tras
    cargar para no competir con el arranque.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>

  <!--
    Stub de PasskeyAuthenticator. supabase_flutter incluye el plugin web
    `passkeys_web`, cuyo registro llama `PasskeyAuthenticator.init()` al arrancar.
    En Fase 1 no usamos passkeys; sin este stub el global es undefined y la app
    crashea antes de main(). Reemplazar por el script real si se habilita passkeys.
  -->
  <script>
    window.PasskeyAuthenticator = window.PasskeyAuthenticator || {
      init: function () {},
      register: function () { return Promise.reject('passkeys disabled'); },
      login: function () { return Promise.reject('passkeys disabled'); },
      cancelCurrentAuthenticatorOperation: function () {},
      isUserVerifyingPlatformAuthenticatorAvailable: function () { return Promise.resolve(false); },
      isConditionalMediationAvailable: function () { return Promise.resolve(false); },
      hasPasskeySupport: function () { return false; }
    };
  </script>
  <style>
    #jz-splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:18px;background:linear-gradient(135deg,#8A7BF6,#5B4ECF);
      transition:opacity .35s ease;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
    #jz-splash.hide{opacity:0;pointer-events:none}
    #jz-splash img{width:110px;height:110px;border-radius:28px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
    #jz-splash .t{color:#fff;font-weight:800;font-size:24px;letter-spacing:.5px}
    #jz-splash .s{width:34px;height:34px;border:4px solid rgba(255,255,255,.35);border-top-color:#fff;
      border-radius:50%;animation:jzspin 1s linear infinite}
    @keyframes jzspin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- Splash de marca mientras Flutter arranca (evita el flash en blanco). -->
  <div id="jz-splash">
    <img src="icons/Icon-192.png" alt="Jezici"/>
    <div class="t">Jezici</div>
    <div class="s"></div>
  </div>
  <script>
    // Quitar el splash cuando Flutter monta su vista.
    (function () {
      function done() {
        var s = document.getElementById('jz-splash');
        if (s) { s.classList.add('hide'); setTimeout(function(){ s.remove(); }, 400); }
      }
      var obs = new MutationObserver(function () {
        if (document.querySelector('flutter-view, flt-glass-pane')) { obs.disconnect(); done(); }
      });
      obs.observe(document.body, { childList: true, subtree: true });
      setTimeout(done, 12000); // failsafe
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
