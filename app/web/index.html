  <!--
    Service worker PWA (update-safe): instala el app shell para que sea
    instalable y funcione offline, sirviendo la app NETWORK-FIRST para no
    quedarse en versiones viejas, y maneja Web Push (Matix). Se registra tras
    cargar para no competir con el arranque.
  -->
  <script>
    // SW + manejo de ACTUALIZACIÓN (P0.5): si llega una versión nueva mientras la
    // app está abierta, mostramos un aviso "Recargar" (no auto-recarga, para no
    // perder el progreso de una lección). El SW va network-first + no-store en el
    // shell, así que tras un deploy el bundle nuevo se sirve y las cachés viejas
    // se borran en 'activate'.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          reg.addEventListener('updatefound', function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', function () {
              // 'installed' + ya había un controlador = es una ACTUALIZACIÓN.
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateBanner();
              }
            });
          });
        }).catch(function () {});
      });
    }
    function showUpdateBanner() {
      if (document.getElementById('jz-update')) return;
      var b = document.createElement('div');
      b.id = 'jz-update';
      b.innerHTML = '<span>Hay una versión nueva de Jezici.</span>' +
        '<button id="jz-reload">Recargar</button>' +
        '<button id="jz-x" aria-label="Cerrar">✕</button>';
      document.body.appendChild(b);
      document.getElementById('jz-reload').onclick = function () { window.location.reload(); };
      document.getElementById('jz-x').onclick = function () { b.remove(); };
    }
  </script>

  <!--

    crashea antes de main(). Reemplazar por el script real si se habilita passkeys.
  -->
  <script>
    window.PasskeyAuthenticator = window.PasskeyAuthenticator || {
      init: function () {},
      register: function () { return Promise.reject('passkeys disabled'); },
      login: function () { return Promise.reject('passkeys disabled'); },
      cancelCurrentAuthenticatorOperation: function () {},
      isUserVerifyingPlatformAuthenticatorAvailable: function () { return Promise.resolve(false); },
      isConditionalMediationAvailable: function () { return Promise.resolve(false); },
      hasPasskeySupport: function () { return false; }
    };
  </script>
  <style>

    #jz-update{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:10000;

<body>
  <!-- Splash de marca mientras Flutter arranca (evita el flash en blanco). -->
  <div id="jz-splash">
    <img src="icons/Icon-192.png?v=5" alt="Jezici"/>
    <div class="t">Jezici</div>
    <div class="s"></div>
  </div>
  <script>
    // Quitar el splash cuando Flutter monta su vista.
    (function () {
      function done() {
        var s = document.getElementById('jz-splash');
        if (s) { s.classList.add('hide'); setTimeout(function(){ s.remove(); }, 400); }
      }
      var obs = new MutationObserver(function () {
        if (document.querySelector('flutter-view, flt-glass-pane')) { obs.disconnect(); done(); }
      });
      obs.observe(document.body, { childList: true, subtree: true });
      setTimeout(done, 12000); // failsafe
    })();
  </script>

  <!--
    Recuperación de PANTALLA NEGRA al volver de segundo plano (Android PWA, CanvasKit).
    Al backgroundear, el proceso GPU puede reciclar el contexto WebGL / pausar el
    repintado; al volver, Flutter no repinta solo → pantalla negra. No había NINGÚN
    manejo de visibility/resume. Fix deploy-safe (solo index.html; no toca el
    buildCommand de vercel.json): al recuperar visibilidad forzamos a Flutter a re-medir
    y repintar con un 'resize' sintético; y si el contexto WebGL se perdió, permitimos su
    restauración y repintamos. Inofensivo donde no aplica (un frame extra, sin parpadeo).
  -->
  <script>
    (function () {
      function jzForceRepaint() {
        // dos rAF: asegura que el compositor esté activo antes del resize sintético.
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            window.dispatchEvent(new Event('resize'));
          });
        });
      }
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') jzForceRepaint();
      });
      // Algunos Android disparan 'focus'/'resume' pero no 'visibilitychange' al
      // volver de segundo plano; cubrimos ambos (el repintado es idempotente).
      window.addEventListener('focus', jzForceRepaint);
      document.addEventListener('resume', jzForceRepaint); // Page Lifecycle API
      // Restauración desde bfcache (volver atrás / reanudar la pestaña).
      window.addEventListener('pageshow', function (e) { if (e.persisted) jzForceRepaint(); });
      // Si el GPU recicló el contexto WebGL en segundo plano: preventDefault permite que
      // el navegador lo restaure; al restaurarse, forzamos el repintado (captura, porque
      // estos eventos del <canvas> no burbujean).
      window.addEventListener('webglcontextlost', function (e) { e.preventDefault(); }, true);
      window.addEventListener('webglcontextrestored', jzForceRepaint, true);
    })();
  </script>
  <!--
    T4 · Puentes JS para INSTALAR la PWA y para WEB PUSH (VAPID). El trabajo
    pesado vive aquí (promesas globales jz*) y Dart solo las invoca por
    js_interop — mínimo binding, deploy-safe (no toca el buildCommand).
  -->
  <script>
    (function () {
      // ── Instalar app ──
      window.jzDeferredPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.jzDeferredPrompt = e;
      });
      window.jzCanInstall = function () { return !!window.jzDeferredPrompt; };
      window.jzIsStandalone = function () {
        return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
            || window.navigator.standalone === true;
      };
      window.jzShowInstall = async function () {
        var p = window.jzDeferredPrompt;
        if (!p) return 'unavailable';
        p.prompt();
        try {
          var r = await p.userChoice;
          window.jzDeferredPrompt = null;
          return r.outcome; // 'accepted' | 'dismissed'
        } catch (_) { return 'dismissed'; }
      };

      // ── Web Push ──
      window.jzPushState = async function () {
        if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) {
          return 'unsupported'; // p. ej. Safari iOS SIN instalar la PWA
        }
        if (Notification.permission === 'denied') return 'denied';
        try {
          var reg = await navigator.serviceWorker.ready;
          var sub = await reg.pushManager.getSubscription();
          return sub ? 'subscribed' : 'ready';
        } catch (_) { return 'unsupported'; }
      };
      // Pide permiso (bajo gesto del usuario) y suscribe. Devuelve JSON o null.
      window.jzPushSubscribe = async function (vapid) {
        try {
          var perm = await Notification.requestPermission();
          if (perm !== 'granted') return null;
          var reg = await navigator.serviceWorker.ready;
          var b64 = vapid.replace(/-/g, '+').replace(/_/g, '/');
          while (b64.length % 4) b64 += '=';
          var raw = atob(b64);
          var key = new Uint8Array(raw.length);
          for (var i = 0; i < raw.length; i++) key[i] = raw.charCodeAt(i);
          var sub = await reg.pushManager.getSubscription();
          if (!sub) {
            sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: key });
          }
          var j = sub.toJSON();
          return JSON.stringify({ endpoint: j.endpoint, p256dh: j.keys.p256dh, auth: j.keys.auth });
        } catch (_) { return null; }
      };
    })();
  </script>
