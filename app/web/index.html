<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Jezici — aprende idiomas con un plan, mapa y certificación por examen.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Jezici">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Jezici</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Limpieza de service worker. Una versión anterior pudo quedar cacheada por el
    service worker de Flutter (deprecado) y seguir sirviendo un bundle roto. Esto
    desregistra cualquier SW y borra sus caches; si encontró alguno, recarga UNA
    vez (guardado en sessionStorage) para que el usuario reciba la versión nueva.
    El build usa --pwa-strategy=none, así que no se vuelve a registrar ninguno.
  -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        if (!regs.length) return;
        var done = Promise.all(regs.map(function (r) { return r.unregister(); }));
        if (window.caches && caches.keys) {
          done = done.then(function () {
            return caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            });
          });
        }
        done.finally(function () {
          if (!sessionStorage.getItem('jz_sw_cleared')) {
            sessionStorage.setItem('jz_sw_cleared', '1');
            location.reload();
          }
        });
      }).catch(function () {});
    })();
  </script>

  <!--
    Stub de PasskeyAuthenticator. supabase_flutter incluye el plugin web
    `passkeys_web`, cuyo registro llama `PasskeyAuthenticator.init()` al arrancar.
    En Fase 1 no usamos passkeys; sin este stub el global es undefined y la app
    crashea antes de main(). Reemplazar por el script real si se habilita passkeys.
  -->
  <script>
    window.PasskeyAuthenticator = window.PasskeyAuthenticator || {
      init: function () {},
      register: function () { return Promise.reject('passkeys disabled'); },
      login: function () { return Promise.reject('passkeys disabled'); },
      cancelCurrentAuthenticatorOperation: function () {},
      isUserVerifyingPlatformAuthenticatorAvailable: function () { return Promise.resolve(false); },
      isConditionalMediationAvailable: function () { return Promise.resolve(false); },
      hasPasskeySupport: function () { return false; }
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
