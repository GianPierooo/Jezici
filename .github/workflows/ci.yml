name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: analyze · test · build web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install deps
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test

      - name: Build web
        # .env es un asset declarado y está gitignored; lo creamos vacío para el
        # build. La config de Supabase usa el fallback público embebido, así que
        # no se necesitan secretos para compilar.
        run: |
          touch .env
          flutter build web --release --pwa-strategy=none
