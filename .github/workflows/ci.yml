name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: analyze · test · build web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pin de versión: CI = fuente de verdad y debe ser reproducible. Subirlo
          # a propósito cuando se valide localmente, no por deriva del canal stable.
          flutter-version: 3.44.3
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install deps
        run: flutter pub get

      # `.env` es un asset DECLARADO en pubspec.yaml pero gitignored (sin secretos en
      # repo). Hay que materializarlo VACÍO ANTES de `flutter analyze` — si no, analyze
      # falla con `asset_does_not_exist` y aborta el job (test/build quedan skipped).
      # La config de Supabase usa el fallback público embebido, así que un .env vacío
      # basta para analyze/test/build. (Antes solo se creaba en el step de build, que
      # corre DESPUÉS de analyze → CI siempre rojo aunque en local diera verde.)
      - name: Prepare .env (asset gitignored)
        run: touch .env

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test

      - name: Build web
        run: flutter build web --release --pwa-strategy=none
