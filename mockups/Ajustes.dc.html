<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:'Nunito',system-ui,sans-serif; }
  .jz-scroll::-webkit-scrollbar{ display:none; }
  @keyframes jzBob{ 0%,100%{ transform:translateY(0) rotate(-3deg) } 50%{ transform:translateY(-4px) rotate(3deg) } }
</style>
</helmet>

<div style="min-height:100vh; width:100%; background:radial-gradient(120% 90% at 50% 0%, #E7E3FF 0%, #EEF0F8 60%, #E6E8F4 100%); display:flex; align-items:center; justify-content:center; padding:32px 16px; font-family:'Nunito',sans-serif;">

  <div style="position:relative; width:390px; height:844px; background:#0B0B16; border-radius:52px; padding:11px; box-shadow:0 40px 80px -20px rgba(48,40,110,.5), 0 0 0 2px rgba(255,255,255,.06) inset;">
    <div style="position:relative; width:368px; height:822px; background:#EEEFF5; border-radius:42px; overflow:hidden;">
      <div style="position:absolute; top:11px; left:50%; transform:translateX(-50%); width:118px; height:34px; background:#0B0B16; border-radius:20px; z-index:60;"></div>

      <!-- top bar -->
      <div style="position:absolute; top:0; left:0; right:0; z-index:30; padding-top:44px; padding-bottom:10px; background:rgba(238,239,245,.9); backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center;">
        <button style="position:absolute; left:16px; bottom:8px; width:36px; height:36px; border:none; border-radius:12px; background:#fff; display:grid; place-items:center; cursor:pointer; box-shadow:0 3px 8px rgba(40,50,110,.1);"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#2B2456" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></button>
        <span style="font-size:16px; font-weight:900; color:#1A1A2E;">Ajustes</span>
      </div>

      <div class="jz-scroll" style="position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; padding:104px 16px 30px;">

        <!-- ===== IDIOMA ===== -->
        <div style="font-size:11px; font-weight:900; letter-spacing:1.2px; color:#9097AE; margin:0 6px 8px;">IDIOMA</div>
        <div style="background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 4px 0 #E4E6EE, 0 10px 20px rgba(60,55,120,.05); margin-bottom:22px;">
          <button style="display:flex; align-items:center; gap:13px; width:100%; border:none; background:#fff; padding:14px 16px; cursor:pointer; border-bottom:1.5px solid #F2F3F8; text-align:left;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#EDEBFF; display:grid; place-items:center; font-size:18px;">🇬🇧</span>
            <span style="flex:1;"><span style="display:block; font-size:14px; font-weight:900; color:#1A1A2E;">Aprendes</span><span style="font-size:11.5px; font-weight:800; color:#9A9FB8;">Inglés · Objetivo B2</span></span>
            <span style="font-size:12.5px; font-weight:900; color:#9A9FB8;">Cambiar</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C2C6D6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
          </button>
          <button style="display:flex; align-items:center; gap:13px; width:100%; border:none; background:#fff; padding:14px 16px; cursor:pointer; text-align:left;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#EDEBFF; display:grid; place-items:center;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg></span>
            <span style="flex:1;"><span style="display:block; font-size:14px; font-weight:900; color:#1A1A2E;">Idioma de la app</span><span style="font-size:11.5px; font-weight:800; color:#9A9FB8;">Español</span></span>
            <span style="font-size:18px;">🇪🇸</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C2C6D6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>

        <!-- ===== NOTIFICACIONES ===== -->
        <div style="font-size:11px; font-weight:900; letter-spacing:1.2px; color:#9097AE; margin:0 6px 8px;">NOTIFICACIONES</div>
        <div style="background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 4px 0 #E4E6EE, 0 10px 20px rgba(60,55,120,.05); margin-bottom:14px; padding:15px 16px;">
          <div style="font-size:14px; font-weight:900; color:#1A1A2E;">Intensidad del coach</div>
          <!-- loro preview -->
          <div style="display:flex; align-items:center; gap:10px; margin:11px 0 14px;">
            <div style="flex:none; width:42px; animation:jzBob 3s ease-in-out infinite;">
              <svg width="42" height="46" viewBox="0 0 84 90">
                <path d="M28 58q-7 18-3 26 7-5 12-18z" fill="#FF7A00"/><path d="M40 60q-1 19 4 26 7-7 7-20z" fill="#FFC93C"/>
                <ellipse cx="46" cy="52" rx="23" ry="25" fill="#FF4D6D"/><ellipse cx="50" cy="56" rx="13" ry="17" fill="#FFE3E8"/>
                <path d="M30 46q-9 8-5 24 13 3 18-10-4-12-13-14z" fill="#FFC93C"/>
                <circle cx="40" cy="28" r="20" fill="#FF6B6B"/><ellipse cx="45" cy="30" rx="13" ry="12" fill="#FFF4E8"/>
                <circle cx="43" cy="27" r="6.2" fill="#fff"/><circle cx="44.5" cy="28" r="3.3" fill="#1A1A2E"/><circle cx="46" cy="26.6" r="1.1" fill="#fff"/>
                <path d="M57 30q11 1 10 8-6 4-11-1z" fill="#FFC93C"/>
              </svg>
            </div>
            <div style="position:relative; flex:1; background:#F4F2FF; border-radius:13px; border-bottom-left-radius:4px; padding:9px 13px;">
              <div style="position:absolute; left:-6px; bottom:10px; width:12px; height:12px; background:#F4F2FF; transform:rotate(45deg);"></div>
              <span style="font-size:12.5px; font-weight:800; color:#6C5CE7;">{{ coachPreview }}</span>
            </div>
          </div>
          <!-- options -->
          <div style="display:flex; flex-direction:column; gap:8px;">
            <sc-for list="{{ coachItems }}" as="c" hint-placeholder-count="4">
              <button onClick="{{ c.onTap }}" style="{{ c.rowStyle }}">
                <span style="{{ c.radioStyle }}"><span style="{{ c.dotStyle }}"></span></span>
                <span style="flex:1; text-align:left; font-size:13.5px; font-weight:900; color:#1A1A2E;">{{ c.name }}</span>
              </button>
            </sc-for>
          </div>
        </div>
        <!-- ventana horaria -->
        <div style="background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 4px 0 #E4E6EE, 0 10px 20px rgba(60,55,120,.05); margin-bottom:22px;">
          <div style="display:flex; align-items:center; gap:13px; padding:14px 16px;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#EAF0FF; display:grid; place-items:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="#4A8CFF"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg></span>
            <span style="flex:1;"><span style="display:block; font-size:14px; font-weight:900; color:#1A1A2E;">No molestar</span><span style="font-size:11.5px; font-weight:800; color:#9A9FB8;">Sin avisos en este horario</span></span>
            <span style="display:inline-flex; align-items:center; gap:5px;">
              <span style="font-size:12.5px; font-weight:900; color:#6C5CE7; background:#EDEBFF; padding:4px 9px; border-radius:9px;">22:00</span>
              <span style="font-size:11px; font-weight:800; color:#9A9FB8;">a</span>
              <span style="font-size:12.5px; font-weight:900; color:#6C5CE7; background:#EDEBFF; padding:4px 9px; border-radius:9px;">8:00</span>
            </span>
          </div>
        </div>

        <!-- ===== META DIARIA ===== -->
        <div style="font-size:11px; font-weight:900; letter-spacing:1.2px; color:#9097AE; margin:0 6px 8px;">META Y RECORDATORIOS</div>
        <div style="background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 4px 0 #E4E6EE, 0 10px 20px rgba(60,55,120,.05); margin-bottom:22px;">
          <button style="display:flex; align-items:center; gap:13px; width:100%; border:none; background:#fff; padding:14px 16px; cursor:pointer; border-bottom:1.5px solid #F2F3F8; text-align:left;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#FFF4D6; display:grid; place-items:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="#E09A00"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></svg></span>
            <span style="flex:1;"><span style="display:block; font-size:14px; font-weight:900; color:#1A1A2E;">Meta diaria</span><span style="font-size:11.5px; font-weight:800; color:#9A9FB8;">15 min · 30 XP al día</span></span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C2C6D6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
          </button>
          <div style="display:flex; align-items:center; gap:13px; padding:14px 16px; border-bottom:1.5px solid #F2F3F8;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#EDEBFF; display:grid; place-items:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></span>
            <span style="flex:1;"><span style="display:block; font-size:14px; font-weight:900; color:#1A1A2E;">Recordatorio diario</span><span style="font-size:11.5px; font-weight:800; color:#9A9FB8;">Todos los días a las 20:00</span></span>
            <button onClick="{{ onDaily }}" style="{{ trDaily }}"><span style="{{ knDaily }}"></span></button>
          </div>
          <div style="display:flex; align-items:center; gap:13px; padding:14px 16px;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#FFF1E3; display:grid; place-items:center;"><svg width="17" height="19" viewBox="0 0 24 28"><path d="M13 1c1 5 6 6 6 12 0 5.5-4 11-7 11s-7-3-7-9c.8 2 2.6 3.4 4.6 3.7-1-1-1.6-2.4-1.6-4 0-3 2.5-4.6 2-8 3 .7 4.3 3 4.4 5.2C11.6 16 12 13 11 10c-.7-2.2.2-7 2-9Z" fill="#FF7A00"/></svg></span>
            <span style="flex:1;"><span style="display:block; font-size:14px; font-weight:900; color:#1A1A2E;">Aviso de racha en peligro</span><span style="font-size:11.5px; font-weight:800; color:#9A9FB8;">Si olvidas practicar</span></span>
            <button onClick="{{ onStreak }}" style="{{ trStreak }}"><span style="{{ knStreak }}"></span></button>
          </div>
        </div>

        <!-- ===== CUENTA ===== -->
        <div style="font-size:11px; font-weight:900; letter-spacing:1.2px; color:#9097AE; margin:0 6px 8px;">CUENTA</div>
        <div style="background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 4px 0 #E4E6EE, 0 10px 20px rgba(60,55,120,.05); margin-bottom:22px;">
          <button style="display:flex; align-items:center; gap:13px; width:100%; border:none; background:#fff; padding:14px 16px; cursor:pointer; border-bottom:1.5px solid #F2F3F8; text-align:left;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#EDEBFF; display:grid; place-items:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></span>
            <span style="flex:1; font-size:14px; font-weight:900; color:#1A1A2E;">Editar perfil</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C2C6D6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
          </button>
          <button style="display:flex; align-items:center; gap:13px; width:100%; border:none; background:#fff; padding:14px 16px; cursor:pointer; border-bottom:1.5px solid #F2F3F8; text-align:left;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#FFF4D6; display:grid; place-items:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="#F4B400"><path d="M3 8l4 4 5-7 5 7 4-4-2 11H5L3 8Z"/></svg></span>
            <span style="flex:1; font-size:14px; font-weight:900; color:#1A1A2E;">Suscripción</span>
            <span style="font-size:11px; font-weight:900; color:#5B3A00; background:linear-gradient(120deg,#FFDD7A,#F4B400); padding:3px 10px; border-radius:8px;">Plan gratis · Mejorar</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C2C6D6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
          </button>
          <button style="display:flex; align-items:center; gap:13px; width:100%; border:none; background:#fff; padding:14px 16px; cursor:pointer; text-align:left;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#FFEFEF; display:grid; place-items:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF4D6D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></span>
            <span style="flex:1; font-size:14px; font-weight:900; color:#FF4D6D;">Cerrar sesión</span>
          </button>
        </div>

        <!-- ===== OTROS ===== -->
        <div style="font-size:11px; font-weight:900; letter-spacing:1.2px; color:#9097AE; margin:0 6px 8px;">OTROS</div>
        <div style="background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 4px 0 #E4E6EE, 0 10px 20px rgba(60,55,120,.05); margin-bottom:18px;">
          <div style="display:flex; align-items:center; gap:13px; padding:14px 16px; border-bottom:1.5px solid #F2F3F8;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#E7F9EF; display:grid; place-items:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2ECC71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg></span>
            <span style="flex:1; font-size:14px; font-weight:900; color:#1A1A2E;">Sonidos</span>
            <button onClick="{{ onSounds }}" style="{{ trSounds }}"><span style="{{ knSounds }}"></span></button>
          </div>
          <div style="display:flex; align-items:center; gap:13px; padding:14px 16px; border-bottom:1.5px solid #F2F3F8;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#EDEBFF; display:grid; place-items:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2.5"/><path d="M2 9v6M22 9v6"/></svg></span>
            <span style="flex:1; font-size:14px; font-weight:900; color:#1A1A2E;">Vibración</span>
            <button onClick="{{ onVibration }}" style="{{ trVibration }}"><span style="{{ knVibration }}"></span></button>
          </div>
          <button style="display:flex; align-items:center; gap:13px; width:100%; border:none; background:#fff; padding:14px 16px; cursor:pointer; text-align:left;">
            <span style="flex:none; width:36px; height:36px; border-radius:11px; background:#EEF0F6; display:grid; place-items:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7A809B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.6 8 10 4.6-1.4 8-5 8-10V5l-8-3Z"/></svg></span>
            <span style="flex:1; font-size:14px; font-weight:900; color:#1A1A2E;">Privacidad y datos</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C2C6D6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>

        <div style="text-align:center; font-size:11px; font-weight:800; color:#A7ABC3;">Jezici · versión 2.4.1</div>

      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { coach:'positivo', daily:true, streak:true, sounds:true, vibration:false };
  COACH = [
    { id:'suave',    name:'Suave',                   ex:'Sin prisa, ve a tu ritmo 🌱' },
    { id:'positivo', name:'Positivo',                ex:'¡Vas genial, sigue así! 🎉' },
    { id:'rezago',   name:'Recordatorio de rezago',  ex:'Llevas 2 días sin practicar… 👀' },
    { id:'duro',     name:'Mano dura',               ex:'Nada de excusas. Hoy toca. 💪' },
  ];
  renderVals() {
    const st = this.state;
    const coachItems = this.COACH.map(c => {
      const on = c.id === st.coach;
      return {
        name: c.name,
        onTap: () => this.setState({ coach: c.id }),
        rowStyle: {
          display:'flex', alignItems:'center', gap:'11px', width:'100%',
          border:'2px solid ' + (on ? '#6C5CE7' : '#EDEEF4'),
          background: on ? '#F4F2FF' : '#FAFAFD', borderRadius:'13px',
          padding:'11px 13px', cursor:'pointer', transition:'all .15s',
        },
        radioStyle: {
          flex:'none', width:'20px', height:'20px', borderRadius:'50%',
          border:'2.5px solid ' + (on ? '#6C5CE7' : '#CDD2E2'),
          display:'grid', placeItems:'center', background:'#fff',
        },
        dotStyle: { width:'10px', height:'10px', borderRadius:'50%', background: on ? '#6C5CE7' : 'transparent' },
      };
    });
    const track = (v) => ({
      flex:'none', width:'48px', height:'28px', borderRadius:'15px', border:'none',
      background: v ? '#2ECC71' : '#D0D5E2', position:'relative', cursor:'pointer',
      transition:'background .2s', boxShadow:'inset 0 1px 2px rgba(0,0,0,.12)',
    });
    const knob = (v) => ({
      position:'absolute', top:'3px', left: v ? '23px' : '3px',
      width:'22px', height:'22px', borderRadius:'50%', background:'#fff',
      transition:'left .2s', boxShadow:'0 2px 4px rgba(0,0,0,.22)',
    });
    const cur = this.COACH.find(c => c.id === st.coach);
    return {
      coachItems, coachPreview: cur.ex,
      trDaily: track(st.daily), knDaily: knob(st.daily), onDaily: () => this.setState(s => ({ daily:!s.daily })),
      trStreak: track(st.streak), knStreak: knob(st.streak), onStreak: () => this.setState(s => ({ streak:!s.streak })),
      trSounds: track(st.sounds), knSounds: knob(st.sounds), onSounds: () => this.setState(s => ({ sounds:!s.sounds })),
      trVibration: track(st.vibration), knVibration: knob(st.vibration), onVibration: () => this.setState(s => ({ vibration:!s.vibration })),
    };
  }
}
</script>
</body>
</html>
