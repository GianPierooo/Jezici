<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { activeTab: 'aprender' };
  componentDidMount() {
    const go = () => { if (this._scroll) this._scroll.scrollTop = this._scroll.scrollHeight; };
    go(); setTimeout(go, 60); setTimeout(go, 250); setTimeout(go, 700);
  }
  renderVals() {
    const active = this.state.activeTab;
    const on = (t) => () => this.setState({ activeTab: t });
    const c = (t) => active === t ? '#6C5CE7' : '#AEB3CC';
    const nav = (t) => ({
      width: '48px', height: '48px', border: 'none', borderRadius: '16px',
      background: active === t ? '#EDEBFF' : 'transparent',
      display: 'grid', placeItems: 'center', cursor: 'pointer', transition: 'background .2s'
    });
    return {
      scrollRef: (el) => { this._scroll = el; },
      onLesson: () => {}, onStart: () => {},
      onAprender: on('aprender'), onPracticar: on('practicar'),
      onConversar: on('conversar'), onLigas: on('ligas'), onPerfil: on('perfil'),
      cAprender: c('aprender'), cPracticar: c('practicar'), cConversar: c('conversar'),
      cLigas: c('ligas'), cPerfil: c('perfil'),
      navAprender: nav('aprender'), navPracticar: nav('practicar'), navConversar: nav('conversar'),
      navLigas: nav('ligas'), navPerfil: nav('perfil'),
    };
  }
}
</script>
